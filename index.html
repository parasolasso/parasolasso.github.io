<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOUT LE MONDE DÉTESTE</title>
    <link rel="icon" type="image/svg+xml" href="images/tlmd_LOGO_sqr.svg">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="site-header"></div>

  <header>
    <img src="images/tlmd_LOGO_sqr.svg" alt="TLMD Logo" style="max-width: 350px; margin-bottom: 16px;">
    <p class="subtitle">— TLMD.FR —</p>

    <p class="section">ÉCOUTER EN STREAMING.</p>
    <div class="buttons">
      <a class="btn" href="https://soundcloud.com/toutlemondedeteste" target="_blank" rel="noopener" data-goatcounter-click="soundcloud" data-goatcounter-title="SoundCloud">
        <img src="https://cdn.simpleicons.org/soundcloud/f5f5f5" alt="">
        SoundCloud
      </a>

      <a class="btn" href="https://spotify.com" target="_blank" rel="noopener" data-goatcounter-click="spotify" data-goatcounter-title="Spotify">
        <img src="https://cdn.simpleicons.org/spotify/f5f5f5" alt="">
        Spotify
      </a>

      <a class="btn" href="https://deezer.com" target="_blank" rel="noopener" data-goatcounter-click="deezer" data-goatcounter-title="Deezer">
        <img src="https://cdn.simpleicons.org/deezer/f5f5f5" alt="">
        Deezer
      </a>

      <a class="btn" href="https://music.apple.com/" target="_blank" rel="noopener" data-goatcounter-click="apple-music" data-goatcounter-title="Apple Music">
        <img src="https://cdn.simpleicons.org/applemusic/f5f5f5" alt="">
        Apple Music
      </a>
    </div>

    <p class="section">ACTUALITÉS.</p>
    <div class="news-summary" id="news-summary"></div>
    <div class="buttons">
      <a class="btn" href="actu.html" data-goatcounter-click="voir-plus-actu" data-goatcounter-title="Voir plus - Actu">Voir plus</a>
    </div>

    <p class="section">RÉSEAUX SOCIAUX.</p>
    <div class="buttons">
      <a class="btn" href="https://www.instagram.com/tlmd.fr/" target="_blank" rel="noopener" data-goatcounter-click="instagram" data-goatcounter-title="Instagram">
        <img src="https://cdn.simpleicons.org/instagram/f5f5f5" alt="">
        Instagram
      </a>

      <a class="btn" href="https://www.facebook.com/people/Tout-Le-Monde-D%C3%A9teste/61591787564886/" target="_blank" rel="noopener" data-goatcounter-click="facebook" data-goatcounter-title="Facebook">
        <img src="https://cdn.simpleicons.org/facebook/f5f5f5" alt="">
        Facebook
      </a>
    </div>

    <p class="section">PROGRAMME ET BILLETTERIE.</p>
    <div class="buttons">
      <a class="btn" href="https://shotgun.live" target="_blank" rel="noopener" data-goatcounter-click="billetterie" data-goatcounter-title="Billetterie">
        <img src="https://api.iconify.design/mdi/ticket-outline.svg?color=%23f5f5f5" alt="">
        Billetterie
      </a>
    </div>

    <p class="section">NOUS PROGRAMMER.</p>
    <div class="buttons">
      <a class="btn" href="https://drive.google.com/file/d/1-lSeBXQOhORbO7izykNqu1bAXUc_06kj/view?usp=drive_link" target="_blank" rel="noopener" data-goatcounter-click="epk" data-goatcounter-title="EPK">
        <img src="https://api.iconify.design/mdi/folder-download-outline.svg?color=%23f5f5f5" alt="">
        EPK
      </a>

      <button class="btn btn-epk" onclick="document.getElementById('contact-modal').classList.add('open')" data-goatcounter-click="contact-open" data-goatcounter-title="Contact">
        <img src="https://api.iconify.design/mdi/email-outline.svg?color=%23f5f5f5" alt="">
        Contact
      </button>
    </div>

    <div class="divider"></div>
  </header>

  <!-- MODAL CONTACT -->
  <div class="modal-overlay" id="contact-modal" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="modal">
      <button class="modal-close" onclick="document.getElementById('contact-modal').classList.remove('open')">×</button>
      <h2>CONTACT</h2>
      <p>Pour toute demande professionnelle (booking, presse, facture), contactez :<br>
      <a href="mailto:contact@tlmd.fr" style="color:rgba(255,255,255,0.5);">contact@tlmd.fr</a></p>
    </div>
  </div>

  <div id="site-footer"></div>

  <!-- SCRIPTS — toujours en fin de body, pour que le DOM soit complet avant leur exécution -->
  <script src="js/actu.js"></script>
  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  
  <script data-goatcounter="https://tlmd.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
